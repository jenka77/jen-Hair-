<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Administration — Jen's &amp; Floran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260626" />
</head>
<body class="admin-body">

  <div id="admin-login" class="admin-login-wrap">
    <form id="admin-login-form" class="account-card admin-login-card">
      <p class="section-kicker">Administration</p>
      <h1 class="account-title">Jen's &amp; Floran</h1>
      <p class="account-lead">Espace réservé à Sa'a Mokolo — commandes et avis clients.</p>
      <label class="field">
        <span>Mot de passe admin</span>
        <input type="password" id="admin-password" name="password" required autocomplete="current-password" />
      </label>
      <button type="button" id="admin-login-btn" class="btn-order account-submit">Se connecter</button>
      <p id="admin-login-error" class="account-message account-message--error" hidden></p>
      <noscript>
        <p class="account-message account-message--error">JavaScript est requis pour cette page.</p>
      </noscript>
    </form>
  </div>

  <div id="admin-app" class="admin-app" hidden>
    <header class="admin-header">
      <div>
        <p class="section-kicker">Administration</p>
        <h1 class="admin-title" id="admin-page-title">Commandes</h1>
      </div>
      <div class="admin-header-actions">
        <button type="button" id="admin-refresh" class="auth-btn auth-btn--outline">Actualiser</button>
        <button type="button" id="admin-logout" class="auth-btn auth-btn--outline">Déconnexion</button>
      </div>
    </header>

    <nav class="admin-tabs" role="tablist" aria-label="Sections admin">
      <button type="button" class="admin-tab active" data-admin-tab="orders" role="tab" aria-selected="true">Commandes</button>
      <button type="button" class="admin-tab" data-admin-tab="reviews" role="tab" aria-selected="false">Avis</button>
    </nav>

    <section id="admin-panel-orders" class="admin-panel">
      <div class="admin-filters">
        <label class="admin-filter">
          <span>Filtrer par statut</span>
          <select id="admin-filter-status">
            <option value="">Toutes</option>
            <option value="pending_payment">En attente de paiement</option>
            <option value="paid">Payée</option>
            <option value="preparing">En préparation</option>
            <option value="ready">Prête (retrait)</option>
            <option value="delivered">Livrée</option>
            <option value="accepted">Confirmée</option>
            <option value="cancelled">Annulée</option>
          </select>
        </label>
      </div>

      <div id="admin-orders" class="admin-orders">
        <p class="account-loading">Chargement des commandes…</p>
      </div>
    </section>

    <section id="admin-panel-reviews" class="admin-panel" hidden>
      <div id="admin-reviews" class="admin-reviews">
        <p class="account-loading">Chargement des avis…</p>
      </div>
    </section>
  </div>

  <script src="gestion-commandes.js?v=20260622"></script>
</body>
</html>
